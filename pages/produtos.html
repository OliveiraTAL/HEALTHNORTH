<!doctype html>
<html lang="pt-br">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="shortcut icon" href="../assets/HealthNorthOFFICIAL.ico" type="image/x-icon" />
  <title>Health North - Descrição do Produto</title>
  <link rel="stylesheet" href="../style/produtos.css" />
</head>

<body>
  <!--Cabeçalho-->
  <header>
    <div class="topo">
      <div class="left">
        <img src="../assets/HealthNorthOFFICIAL.ico"
          alt="Logo da Health North, ela é de cor roxa gradiente com o N de North/Norte" />
        <h1>Health North</h1>
      </div>

      <div class="center">
        <!--<Nav>egar pelo sites, colocando o seletor de classe com o CSS3-->
        <nav class="menu">
          <!--O <a /> é um local para linkar urls diferentes-->
          <a id="idinstrumentais" href="">Instrumentais</a>
          <a href="">Descartáveis</a>
          <a href="">Equipamentos</a>
          <a href="">Esterializados</a>
          <a href="">Suprimentos</a>
        </nav>
      </div>

      <div class="right-icons">
        <div class="caixa-pesquisa">
          <input type="text" placeholder="Buscar produtos" />
          <img src="../assets/search.png" alt="Lupa de pesquisa" />
        </div>
        <div class="icones">
          <a href="user.html">
            <img src="../assets/user.png" alt="usuário" /></a>
          <a href="favorites.html">
            <img src="../assets/heart.png" alt="favoritos" /></a>
          <a href="cart.html"><img src="../assets/shoppingcart.png" alt="carrinho de compras" /></a>
        </div>
      </div>
    </div>
  </header>

  <article class="produto">

    <div class="main">
      <div class="descriptionLeft">
        <div class="imagem-principal">
          <img id="img-principal" src="" alt="Imagem principal do produto">
        </div>

        <div class="imagens-inferior" id="img-inferior"></div>

      </div>

      <div class="descriptionRight">
        <div class="produto-topo">
          <span class="tag">EDIÇÃO PREMIUM</span>
          <div class="avaliacao">
            ★★★★★
            <span>(128 avaliações)</span>
          </div>

        </div>

        <h2 id="nome-produto"></h2>

        <p class="description" id="descricao-produto"></p>

        <div class="box-preco">
          <div class="linha-preco">
            <h3 id="preco-promocional"></h3>
            <span id="preco-antigo"></span>
            <span id="desconto"></span>

          </div>

          <p class="parcelamento">
            Em até 10x sem juros
          </p>

          <div class="botoes">

            <button class="carrinho">
              Adicionar ao Carrinho
            </button>

            <button class="comprar">
              Comprar Agora
            </button>

          </div>

        </div>

        <div class="quantidade">

          <button id="diminuir">-</button>

          <span id="quantidade-numero">1</span>

          <button id="aumentar">+</button>

        </div>

        <div class="blocos-inferiores">

          <div class="area-frete">
            <p>📦 CALCULAR FRETE</p>
            <input id="frete" placeholder="00000-000">
            <button id="btn-calcular-frete">
              OK
            </button>

          </div>

          <div class="pagamento">
            <p>💳 PAGAMENTO</p>
            <button id="btn-pagamento-pix">
              PIX
            </button>
            <button id="btn-pagamento-cartao">
              CARTÃO
            </button>

          </div>

        </div>

        <div id="cores"></div>

        <div id="tamanhos"></div>

      </div>

    </div>

  </article>

  <!--Linkando o JavaScript com HTML-->
  <script src="/js/product.js"></script>
</body>

</html>
